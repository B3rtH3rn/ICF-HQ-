<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calm Breathing Buddy</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f0f9f6;
      color: #295c50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #8ecdb6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.1rem;
      transition: transform 4s ease-in-out;
      transform: scale(1);
    }
    .circle.grow { transform: scale(1.5); }
    p { max-width: 280px; color: #5c6b68; }
  </style>
</head>
<body>
  <h1>🫧 Calm Breathing Buddy</h1>
  <div class="circle" id="circle">Breathe in...</div>
  <p>Follow the circle. It grows as you breathe in, and shrinks as you breathe out.</p>

  <script>
    const circle = document.getElementById("circle");
    let breatheIn = true;

    function cycle() {
      circle.classList.toggle("grow", breatheIn);
      circle.textContent = breatheIn ? "Breathe in..." : "Breathe out...";
      breatheIn = !breatheIn;
    }

    cycle();
    setInterval(cycle, 4000);
  </script>
</body>
</html>
